<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beginner Japanese Notes</title>
    <style>
        /* --- 1. CSS STYLING --- */
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --card-front: #ffffff;
            --card-back: #eef5fc;
            --text-dark: #333333;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        /* Toolbar Controls */
        .controls {
            margin-bottom: 30px;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #357abd;
        }

        /* Flashcard Grid Layout */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }

        /* Flashcard Wrapper (3D Effect Setup) */
        .card-container {
            perspective: 1000px;
            height: 180px;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 12px;
        }

        /* JS toggles this class to flip the card */
        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        /* Front and Back Mechanics */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            border: 2px solid #e1e8ed;
        }

        .card-front {
            background-color: var(--card-front);
        }

        .card-back {
            background-color: var(--card-back);
            transform: rotateY(180deg);
        }

        /* Big Japanese characters for visibility */
        .kana {
            font-size: 3.5rem;
            font-weight: bold;
            margin: 0;
        }

        /* Hidden helper labels */
        .hint {
            font-size: 0.85rem;
            color: #888;
            margin-top: 10px;
        }

        .romaji {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .english {
            font-size: 1rem;
            color: #666;
            margin-top: 5px;
        }

        /* Global toggle helper */
        .hide-romaji .hint {
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>あ Beginner Hiragana Notes</h1>
        <p>Click a card to reveal the sound. Use the toolbar to challenge yourself!</p>
    </header>

    <div class="controls">
        <button class="btn" id="toggleHints">Toggle Hints (Romaji)</button>
    </div>

    <main class="card-grid" id="grid">
        </main>

    <script>
        // Data structure holding our beginner characters
        const hiraganaData = [
            { kana: 'あ', romaji: 'a', example: 'ah as in car' },
            { kana: 'い', romaji: 'i', example: 'ee as in meet' },
            { kana: 'う', romaji: 'u', example: 'oo as in boot' },
            { kana: 'え', romaji: 'e', example: 'eh as in let' },
            { kana: 'お', romaji: 'o', example: 'oh as in boat' }
        ];

        const grid = document.getElementById('grid');
        const toggleBtn = document.getElementById('toggleHints');

        // Dynamically build the card HTML
        function generateCards() {
            hiraganaData.forEach(item => {
                const container = document.createElement('div');
                container.className = 'card-container';
                
                container.innerHTML = `
                    <div class="flashcard">
                        <div class="card-face card-front">
                            <p class="kana">${item.kana}</p>
                            <span class="hint">(${item.romaji})</span>
                        </div>
                        <div class="card-face card-back">
                            <p class="romaji">${item.romaji}</p>
                            <p class="english">${item.example}</p>
                        </div>
                    </div>
                `;
                
                // Event listener to handle individual card flipping
                container.addEventListener('click', () => {
                    const card = container.querySelector('.flashcard');
                    card.classList.toggle('is-flipped');
                });

                grid.appendChild(container);
            });
        }

        // Master button logic: hides or reveals small hints on the front of the cards
        toggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('hide-romaji');
        });

        // Initialize the page layout
        generateCards();
    </script>
</body>
</html>
